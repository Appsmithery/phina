# Supabase project config for local CLI workflows (for example `supabase start`
# and `supabase functions serve`).
#
# This file does NOT manage the hosted production project's Auth dashboard
# settings. Keep localhost defaults here for local development, and configure
# production values such as Site URL, redirect URLs, email templates, custom
# SMTP, rate limits, and CAPTCHA directly in the Supabase dashboard.
#
# Production reference:
# - Site URL: https://phina.appsmithery.co
# - Allowed redirect URL: https://phina.appsmithery.co/callback
# See also docs/SUPABASE_PRODUCTION.md.
# See: https://supabase.com/docs/guides/cli/config

project_id = "phina"

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
port = 54323

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true

[storage]
file_size_limit = "50MiB"
