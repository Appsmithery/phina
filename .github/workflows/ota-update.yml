name: OTA Update

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to publish"
        required: true
        default: "main"
      channel:
        description: "Update channel"
        required: true
        type: choice
        options:
          - preview
          - production
      message:
        description: "Update message"
        required: true
        default: "Manual OTA update"

concurrency:
  group: ota-update-${{ inputs.channel }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OTA_ENVIRONMENT: ${{ inputs.channel == 'preview' && 'preview' || 'production' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Check EAS token
        run: |
          [[ -n "${{ secrets.EXPO_TOKEN }}" ]] || { echo "::error::EXPO_TOKEN missing"; exit 1; }
          eas whoami

      - name: Validate channel to environment mapping
        run: |
          case "${{ inputs.channel }}" in
            preview)
              [[ "${OTA_ENVIRONMENT}" == "preview" ]] || { echo "::error::Preview channel must publish with preview environment"; exit 1; }
              ;;
            production)
              [[ "${OTA_ENVIRONMENT}" == "production" ]] || { echo "::error::Production channel must publish with production environment"; exit 1; }
              ;;
            *)
              echo "::error::Unsupported channel ${{ inputs.channel }}"
              exit 1
              ;;
          esac

      - name: Verify EAS environment before publish
        run: node scripts/verify-eas-env.mjs --environment "${OTA_ENVIRONMENT}" --platform all

      - name: Publish OTA update
        run: eas update --channel ${{ inputs.channel }} --environment "${OTA_ENVIRONMENT}" --message "${{ inputs.message }}" --platform all --non-interactive

      - name: Summarize OTA update
        run: |
          {
            echo "## OTA update"
            echo ""
            echo "- Ref: ${{ inputs.git_ref }}"
            echo "- Channel: ${{ inputs.channel }}"
            echo "- Environment: ${OTA_ENVIRONMENT}"
            echo "- Message: ${{ inputs.message }}"
          } >> "$GITHUB_STEP_SUMMARY"
