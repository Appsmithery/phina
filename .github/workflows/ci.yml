name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci

  deploy:
    runs-on: ubuntu-latest
    needs: check
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Check deploy secrets
        run: |
          [[ -n "${{ secrets.DROPLET_HOST }}" ]] || { echo "::error::DROPLET_HOST missing"; exit 1; }
          [[ -n "${{ secrets.DROPLET_SSH_KEY }}" ]] || { echo "::error::DROPLET_SSH_KEY missing"; exit 1; }
          [[ -n "${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" ]] || { echo "::error::EXPO_PUBLIC_SUPABASE_URL missing"; exit 1; }
          [[ -n "${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" ]] || { echo "::error::EXPO_PUBLIC_SUPABASE_ANON_KEY missing"; exit 1; }

      - name: Build web
        run: npm run export:web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_APP_URL: ${{ secrets.EXPO_PUBLIC_APP_URL }}
          EXPO_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.EXPO_PUBLIC_VAPID_PUBLIC_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_POSTHOG_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}

      - name: Verify build output
        run: |
          [[ -f dist/index.html ]] || { echo "::error::Build did not produce dist/index.html"; exit 1; }

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          set -e
          # Write key with newlines preserved; strip CRLF (fixes "error in libcrypto" on Windows-pasted keys)
          KEY_FILE="deploy_key.pem"
          printf '%s\n' "$SSH_PRIVATE_KEY" | sed 's/\r$//' > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          # Validate PEM shape so we fail with a clear message instead of libcrypto
          if ! grep -q "BEGIN.*PRIVATE KEY" "$KEY_FILE" || ! grep -q "END.*PRIVATE KEY" "$KEY_FILE"; then
            echo "::error::Written key file missing BEGIN/END lines. Check DROPLET_SSH_KEY: paste full PEM (all lines, LF line endings)."
            exit 1
          fi
          eval "$(ssh-agent -s)"
          ssh-add "$KEY_FILE" || { echo "::error::ssh-add failed. Check DROPLET_SSH_KEY is full PEM."; exit 1; }
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          rm -f "$KEY_FILE"

      - name: Deploy to droplet
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=15"
          ssh $SSH_OPTS "$DROPLET_HOST" "mkdir -p /var/www/phina"
          rsync -avz --delete -e "ssh $SSH_OPTS" dist/ "$DROPLET_HOST:/var/www/phina/"
