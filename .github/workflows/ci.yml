name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci

  deploy:
    runs-on: ubuntu-latest
    needs: check
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Check deploy secrets
        run: |
          if [[ -z "${{ secrets.DROPLET_HOST }}" ]]; then echo "::error::DROPLET_HOST secret is missing or empty"; exit 1; fi
          if [[ -z "${{ secrets.DROPLET_SSH_KEY }}" ]]; then echo "::error::DROPLET_SSH_KEY secret is missing or empty"; exit 1; fi
          if [[ -z "${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" ]]; then echo "::error::EXPO_PUBLIC_SUPABASE_URL secret is missing or empty"; exit 1; fi
          if [[ -z "${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" ]]; then echo "::error::EXPO_PUBLIC_SUPABASE_ANON_KEY secret is missing or empty"; exit 1; fi
          echo "Required secrets are set"

      - name: Build web
        run: npm run export:web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_APP_URL: ${{ secrets.EXPO_PUBLIC_APP_URL }}

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          # Write key to file with Unix line endings (fixes "error in libcrypto" when pasted with CRLF)
          echo "$SSH_PRIVATE_KEY" | sed 's/\r$//' > deploy_key.pem
          chmod 600 deploy_key.pem
          eval "$(ssh-agent -s)"
          ssh-add deploy_key.pem
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          rm -f deploy_key.pem

      - name: Deploy to droplet
        run: |
          DROPLET_HOST="${{ secrets.DROPLET_HOST }}"
          SSH_OPTS="-o StrictHostKeyChecking=accept-new"
          ssh $SSH_OPTS "$DROPLET_HOST" "mkdir -p /var/www/phina"
          rsync -avz --delete -e "ssh $SSH_OPTS" dist/ "$DROPLET_HOST:/var/www/phina/"
